name: Deploy

# Deploy the app + sync Worker to Cloudflare. Runs only after the CI workflow completes on main and
# only if it passed, so deploy is gated on the pure-CI checks without duplicating them here.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# One deployment at a time; let an in-progress deploy finish rather than cancelling it.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Deploy the exact commit CI validated, not just the latest main.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy
        # CI checks out a detached HEAD (head_sha), so wrangler can't infer the branch and would
        # ship a preview; --branch=main forces the production deployment.
        run: bunx wrangler pages deploy --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
